services:
  - type: web
    name: rupeestop-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: GEMINI_API_KEYS
        sync: false
      - key: GROQ_API_KEYS
        sync: false
